services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # เก็บข้อมูล database ไว้ใน named volume → ข้อมูลไม่หายเมื่อ restart container
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # เช็คว่า postgres พร้อมรับ connection จริงหรือยังด้วย pg_isready
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # เชื่อมต่อ db ผ่านชื่อ service "db" (Docker network DNS)
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
    depends_on:
      db:
        # รอจน db ผ่าน healthcheck ก่อน แล้วค่อย start web (migrate/seed จะได้ไม่พลาด)
        condition: service_healthy

volumes:
  pgdata:
